layout:
  sector_distribution:
    SectorA: 90
    SectorB: 210
    SectorC: 330

  positioning_rules:
    sort_by: ["circle", "importance", "name"]
    angle_spread: 160 # Increased for Madrid readability
    circle_radius:
      1: 180 # Increased for Madrid sector
      2: 260
      3: 340

display:
  show_sector_labels: true
  show_circles: true
  line_styles:
    strong:
      width: 3
      style: solid
    normal:
      width: 2
      style: solid
    weak:
      width: 1
      style: dashed
  point_styles:
    important:
      size: 9
      style: filled
    normal:
      size: 5
      style: filled
  colors:
    red: "#FF6B6B"
    blue: "#4ECDC4"
    green: "#2ECC71"
    yellow: "#96CEB4"
    purple: "#FFEAA7"
    orange: "#DDA0DD"


